name: Build Android Release (EAS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Perfil do EAS Build (preview ou production)"
        required: true
        default: "production"
        type: choice
        options:
          - preview
          - production
      submit_to_store:
        description: "Publicar na Play Store (Internal Track). Requer profile production."
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "mobile-v*"

jobs:
  build_android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android release on EAS
        env:
          EAS_NO_VCS: 1
          EAS_PROFILE: ${{ github.event.inputs.profile || 'production' }}
        run: eas build --platform android --profile "$EAS_PROFILE" --non-interactive --wait

      - name: Submit Android para Play Store (internal)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.submit_to_store && inputs.profile == 'production' }}
        env:
          EAS_NO_VCS: 1
        run: eas submit --platform android --profile production --latest --non-interactive
